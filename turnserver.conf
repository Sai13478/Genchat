# Coturn TURN Server Configuration for Genchat
# ==============================================

# STUN/TURN listening port
listening-port=3478

# Use fingerprint in TURN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech

# TURN server credentials (change these for security)
user=genchat:genchat123

# Realm (can be anything, used for credential scoping)
realm=genchat.local

# Total relay throughput limit (0 = unlimited)
total-quota=100

# Per-session bandwidth limit in bytes/s (0 = unlimited)
bps-capacity=0

# Relay port range (must match your port forwarding)
min-port=49152
max-port=65535

# Disable CLI (not needed for simple setup)
no-cli

# Log to stdout for Docker
log-file=stdout

# Disable TLS for simplicity (use if you don't have certs)
no-tls
no-dtls

# Allow loopback for testing
allow-loopback-peers

# Verbose logging (remove in production for performance)
verbose
